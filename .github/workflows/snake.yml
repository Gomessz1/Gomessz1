name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Gomessz1
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23FFD700&color_dots=%23161B22,%233B2F00,%235C4500,%237A5A00,%23997000,%23B8860B,%23D4A017,%23FFD700,%23FFE55C,%23FFF176

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
