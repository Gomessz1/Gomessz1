name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Gomessz1
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=FFD700&color_dots=#161B22,#3B2F00,#5C4500,#7A5A00,#997000,#B8860B,#D4A017,#FFD700,#FFE55C,#FFF176
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
